name: CI

# Runs on every push and PR. Each step must pass — a failing lint, typecheck,
# or build step fails the whole job (default `bash -e` behavior of `run:`
# steps), which is what blocks a broken commit from looking green.
on:
  push:
    branches: ["**"]
  pull_request:

# Cancels superseded runs on the same branch/PR instead of letting them pile
# up and race each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
