name: CI

# Runs on every push and PR. Each step must pass — a failing lint, typecheck,
# or build step fails the whole job (default `bash -e` behavior of `run:`
# steps), which is what blocks a broken commit from looking green.
on:
  push:
    branches: ["**"]
  pull_request:

# Cancels superseded runs on the same branch/PR instead of letting them pile
# up and race each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Generates `.velite/` (the `@/.velite` content-types module that
      # lib/content.ts and several pages import from). next.config.ts only
      # triggers this as a side effect of `next dev`/`next build`, so on a
      # fresh checkout — no `.velite/` yet, since it's gitignored — a
      # standalone `tsc --noEmit` run below would otherwise fail on an
      # unresolved module before `next build` ever gets a chance to
      # generate it itself. Explicit step instead of reordering Typecheck
      # after Build, so a real type error still fails fast at the
      # Typecheck step instead of surfacing as a Build failure.
      - name: Generate content types (Velite)
        run: npm run content

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
