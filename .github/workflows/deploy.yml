name: Deploy

# Prepared, not active: builds and validates the production Docker image so
# a broken Dockerfile is caught in CI, but does not push to a registry or
# touch any server yet. Manual trigger only — this intentionally does not
# run on every push to `main`, so merging to main can never accidentally
# deploy before a real target server exists.
#
# To go live later (see DEPLOYMENT.md "Hetzner-Vorbereitung"):
#   1. Add a container registry login step and `docker push`.
#   2. Add repository secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY (or a
#      registry-based pull-on-server approach instead of SSH).
#   3. Uncomment/add the actual deploy step at the bottom of this file.
#   4. Consider switching `on:` to `push: { branches: [main] }` or a release
#      tag trigger once that's desired.
on:
  workflow_dispatch: {}

jobs:
  build-image:
    name: Build production Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (not pushed anywhere)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: neuralcraft-platform:ci
          build-args: |
            BUILD_TIME=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

