# Production usage:   docker compose up -d --build
# Dev-container usage: docker compose --profile dev up dev
#
# Both read variables from a local `.env` (create it from .env.example —
# never commit it). Compose auto-loads `.env` for the ${...} interpolation
# below; `env_file` additionally injects those variables into the running
# container for anything read at request time (e.g. RESEND_API_KEY).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # `:-fallback` (not `:-`/empty) matters here: Compose passes build
        # args through even when unset in .env, which would otherwise hand
        # the Dockerfile an *empty-but-defined* value and silently override
        # its own `ARG ...=fallback` default — see lib/site.ts's comment for
        # why an empty NEXT_PUBLIC_SITE_URL breaks the build outright.
        BUILD_TIME: ${BUILD_TIME:-unknown}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_ANALYTICS_PROVIDER: ${NEXT_PUBLIC_ANALYTICS_PROVIDER:-}
        NEXT_PUBLIC_ANALYTICS_DOMAIN: ${NEXT_PUBLIC_ANALYTICS_DOMAIN:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    restart: unless-stopped
    init: true # PID 1 signal handling / zombie reaping, no extra package needed
    ports:
      - "3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
